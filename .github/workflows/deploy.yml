name: Deploy Web App

on:
  push:
    branches: [main]

jobs:
  # ── Frontend: Build ─────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm install

      - name: Build
        run: cd frontend && npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # ── Frontend: Deploy to Cloudflare Pages ────────────────────
  # Set CLOUDFLARE_ACCOUNT_ID as a repo variable to enable this job
  deploy-frontend:
    needs: build-frontend
    runs-on: ubuntu-latest
    if: ${{ vars.CLOUDFLARE_ACCOUNT_ID != '' }}
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          projectName: cv-format-tool
          directory: dist

  # ── Backend: Deploy to Render ────────────────────────────────
  deploy-backend:
    runs-on: ubuntu-latest
    if: ${{ vars.RENDER_SERVICE_ID != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync Render service settings
        run: |
          curl -s -X PATCH "https://api.render.com/v1/services/${{ vars.RENDER_SERVICE_ID }}" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "serviceDetails": {
                "buildCommand": "(apt-get update && apt-get install -y tesseract-ocr tesseract-ocr-vie tesseract-ocr-eng) || echo Tesseract install skipped; pip install -r requirements.txt",
                "startCommand": "uvicorn main:app --host 0.0.0.0 --port 8000"
              }
            }'

      - name: Deploy to Render
        run: |
          curl -s -X POST "https://api.render.com/v1/services/${{ vars.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"branch":"main","commitHookId":"${{ github.sha }}","source":"github"}'
