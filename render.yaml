services:
  - type: web
    name: cv-format-api
    runtime: python
    region: singapore
    rootDir: backend
    buildCommand: (apt-get update && apt-get install -y tesseract-ocr tesseract-ocr-vie tesseract-ocr-eng) || echo "Tesseract install skipped"; pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 8000
    healthCheckPath: /health
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: GOOGLE_DRIVE_REFRESH_TOKEN
        sync: false
      - key: GOOGLE_DRIVE_CLIENT_ID
        sync: false
      - key: GOOGLE_DRIVE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_DRIVE_FOLDER_ID
        sync: false
